<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>musicof01 · transmission</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-color: #e3d8c8;
            --text-dark: #2a2a2a;
            --text-muted: #c2b39f;
            --orange: #d17541;
            --green: #25d656;
            --dark-gray: #303030;
            --light-blue: #88c0d0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden; /* Canvas style, no scrolling */
            font-family: 'Playfair Display', serif;
            color: var(--text-dark);
            user-select: none;
        }

        /* --- Noise Overlay --- */
        .noise::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- Curved Top Text --- */
        .curved-text-container {
            position: absolute;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
            width: 60vw;
            min-width: 600px;
            pointer-events: none;
            z-index: 10;
        }
        .curved-text-container text {
            fill: #fff;
            font-size: 20px;
            font-style: italic;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* --- Left Navigation --- */
        .sidebar {
            position: absolute;
            left: -10px;
            top: 45%;
            transform: translateY(-50%) rotate(-2deg);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 50;
        }
        .nav-item {
            background-color: var(--dark-gray);
            color: #ccc;
            padding: 8px 30px 8px 20px;
            text-decoration: none;
            font-family: 'Courier Prime', monospace;
            font-size: 14px;
            transform: skewX(-5deg);
            box-shadow: 3px 3px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
        }
        .nav-item:hover {
            transform: skewX(-5deg) translateX(10px);
        }
        .nav-item.active {
            background-color: var(--orange);
            color: #222;
            font-weight: bold;
        }
        .nav-item.small {
            font-size: 10px;
            padding: 5px 20px 5px 15px;
            color: #888;
        }

        /* --- Draggable Nodes (Blobs & Windows) --- */
        .node {
            position: absolute;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s;
        }
        .node:active { cursor: grabbing; transform: scale(0.98); }

        .blob-mask {
            width: 15vw;
            height: 15vw;
            min-width: 150px;
            min-height: 150px;
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 10px 10px 20px rgba(0,0,0,0.4);
            transition: border-radius 0.3s ease;
            position: relative;
        }

        /* Organic specific shapes */
        .shape-1 { border-radius: 43% 57% 65% 35% / 45% 55% 45% 55%; }
        .shape-2 { border-radius: 50% 50% 40% 60% / 60% 40% 60% 40%; }
        .shape-3 { border-radius: 60% 40% 50% 50% / 50% 50% 60% 40%; }
        .shape-4 { border-radius: 35% 65% 55% 45% / 45% 40% 60% 55%; }
        .shape-5 { border-radius: 40% 45% 60% 45% / 45% 50% 60% 45%; }
        .shape-6 { border-radius: 35% 60% 50% 55% / 40% 35% 55% 65%; }

        /* Typography under blobs */
        .node-info {
            text-align: center;
            margin-top: 15px;
            pointer-events: none;
        }
        .node-title {
            font-size: 1.1rem;
            font-style: italic;
            color: #8a7c6b;
            margin-bottom: 2px;
        }
        .node-desc {
            font-family: 'Courier Prime', monospace;
            font-size: 0.65rem;
            color: #a8967d;
            text-transform: lowercase;
        }

        /* --- OS Window (WHO.TXT) --- */
        .os-window {
            background-color: #3f3d38;
            border: 2px solid #222;
            width: 220px;
            box-shadow: 15px 15px 20px rgba(0,0,0,0.3);
            transform: rotate(2deg);
        }
        .window-header {
            background-color: var(--orange);
            border-bottom: 2px solid #222;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier Prime', monospace;
            font-size: 10px;
            color: #111;
            font-weight: bold;
        }
        .window-header button {
            background: none; border: 1px solid #111; 
            width: 14px; height: 14px; line-height: 10px;
            cursor: pointer; font-size: 10px; padding:0;
        }
        .window-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .window-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border: 1px solid #222;
            margin-bottom: 15px;
            filter: contrast(1.2) saturate(1.5); /* Make it pop */
        }
        .window-number {
            color: #fff;
            font-family: 'Courier Prime', monospace;
            margin-bottom: 10px;
        }
        .follow-btn {
            background-color: var(--light-blue);
            border: 1px solid #222;
            padding: 4px 15px;
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #222;
        }
        .follow-btn:active { box-shadow: 0 0 0 #222; transform: translate(2px, 2px); }

        /* --- Connection Tags --- */
        .tag {
            position: absolute;
            background-color: #44433e;
            color: #a89f91;
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            padding: 4px 10px;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
            cursor: grab;
            z-index: 15;
        }

        /* Specific Positions matching the image */
        #node-zamagetsi { top: 20%; left: 20%; }
        #node-play      { top: 45%; left: 35%; z-index: 20; transform: scale(1.1); }
        #node-lamenting { top: 25%; left: 52%; }
        #node-funzel    { top: 65%; left: 22%; }
        #node-rain      { top: 70%; left: 50%; }
        #window-who     { top: 15%; left: 70%; z-index: 30; }
        
        #tag-1 { top: 28%; left: 63%; transform: rotate(-3deg); }
        #tag-2 { top: 32%; left: 62%; transform: rotate(2deg); }

        /* Image filters for moody aesthetic */
        .sepia-filter { filter: sepia(0.8) contrast(1.1) brightness(0.8) opacity(0.9); }
        .dark-filter  { filter: grayscale(0.5) contrast(1.2) brightness(0.6) sepia(0.3); }

    </style>
</head>
<body class="noise">

    <!-- Arched Text -->
    <div class="curved-text-container">
        <svg viewBox="0 0 800 150">
            <path id="curve" d="M 50 150 Q 400 -20 750 150" fill="transparent" />
            <text>
                <textPath href="#curve" startOffset="50%" text-anchor="middle">musicof01 · a transmission from nowhere</textPath>
            </text>
        </svg>
    </div>

    <!-- Sidebar Nav -->
    <nav class="sidebar">
        <a class="nav-item active">music *</a>
        <a class="nav-item">kits</a>
        <a class="nav-item">transmission</a>
    </nav>

    <!-- Node: Zamagetsi -->
    <div class="node" id="node-zamagetsi">
        <!-- Using a cubist/abstract placeholder image -->
        <div class="blob-mask shape-1" style="background-image: url('https://images.unsplash.com/photo-1541961017774-22349e4a1262?q=80&w=400&auto=format&fit=crop'); filter: sepia(0.3) saturate(1.5);"></div>
        <div class="node-info">
            <div class="node-title">Zamagetsi</div>
            <div class="node-desc">2026 · 12 fractured movements</div>
        </div>
    </div>

    <!-- Node: Funzel -->
    <div class="node" id="node-funzel">
        <!-- Dark, moody forest placeholder -->
        <div class="blob-mask shape-2 dark-filter" style="background-image: url('https://images.unsplash.com/photo-1503460831628-971c6dcbfdbd?q=80&w=400&auto=format&fit=crop');"></div>
        <div class="node-info">
            <div class="node-title">Funzel</div>
            <div class="node-desc">2023 · ambient drown tape</div>
        </div>
    </div>

    <!-- Node: Lamenting -->
    <div class="node" id="node-lamenting">
        <!-- Statue placeholder -->
        <div class="blob-mask shape-4 sepia-filter" style="background-image: url('https://images.unsplash.com/photo-1549429188-7e5d80b43171?q=80&w=400&auto=format&fit=crop');"></div>
        <div class="node-info">
            <div class="node-title">Lamenting</div>
            <div class="node-desc">2024 · single / 4:41</div>
        </div>
    </div>

    <!-- Node: Rain -->
    <div class="node" id="node-rain">
        <!-- Statue/water placeholder -->
        <div class="blob-mask shape-1 sepia-filter" style="background-image: url('https://images.unsplash.com/photo-1555580168-9de169b183ce?q=80&w=400&auto=format&fit=crop'); transform: scale(0.9);"></div>
        <div class="node-info">
            <div class="node-title">Rain</div>
            <div class="node-desc">2023 · the wet one</div>
        </div>
    </div>

    <!-- Floating Tags -->
    <div class="node tag" id="tag-1">@musicof01</div>
    <div class="node tag" id="tag-2">@themusicof01</div>

    <!-- OS Window Node -->
    <div class="node os-window" id="window-who">
        <div class="window-header">
            <span>WHO.TXT</span>
        </div>
        <div class="window-body">
            <!-- Trippy/neon placeholder image -->
            <img class="window-img" src="https://f4.bcbits.com/img/0043370439_20.jpg?q=80&w=400&auto=format&fit=crop" alt="trippy mind">
            <div class="window-number">01</div>
            <button class="follow-btn">following ♡</button>
        </div>
    </div>

    <script>
        // Extremely simple drag-and-drop script to make it "weird" and interactive 
        // without breaking the static site paradigm.
        const nodes = document.querySelectorAll('.node');
        let highestZIndex = 100;

        nodes.forEach(node => {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            node.addEventListener('mousedown', (e) => {
                // Ignore button clicks inside windows
                if(e.target.tagName.toLowerCase() === 'button') return;

                isDragging = true;
                
                // Bring to front
                highestZIndex++;
                node.style.zIndex = highestZIndex;

                startX = e.clientX;
                startY = e.clientY;
                
                // Get computed styles to handle percentage-to-pixel conversion seamlessly during drag
                const rect = node.getBoundingClientRect();
                const parentRect = node.parentElement.getBoundingClientRect();
                
                initialLeft = rect.left - parentRect.left;
                initialTop = rect.top - parentRect.top;

                // Temporarily switch from percentages to pixels for smooth dragging
                node.style.left = `${initialLeft}px`;
                node.style.top = `${initialTop}px`;
                node.style.transform = 'none'; // reset transform to avoid drag jitter
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const dx = e.clientX - startX;
                const dy = e.clientY - startY;

                node.style.left = `${initialLeft + dx}px`;
                node.style.top = `${initialTop + dy}px`;
            });

            document.addEventListener('mouseup', () => {
                if(isDragging) {
                    isDragging = false;
                    // Optional: You could convert pixels back to percentages here 
                    // if you want resize stability, but leaving it as px works for a session.
                }
            });
        });
    </script>
</body>
</html>
